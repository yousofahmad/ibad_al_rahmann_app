name: ibad_al_rahmann
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # الأساسيات
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  share_plus: ^12.0.1
  google_fonts: ^6.1.0
  
  # 👇 المكتبة الجديدة للصوت
  audioplayers: ^6.0.0
  file_picker: ^8.1.4

  # باقي مكتباتك
  android_alarm_manager_plus: ^5.0.0
  http: ^1.2.0
  url_launcher: ^6.2.5
  adhan: ^2.0.0+1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  font_awesome_flutter: ^10.7.0
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.2.3
  smooth_page_indicator: ^1.1.0
  flutter_overlay_window: ^0.5.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.2
  intl: ^0.20.2
  
  # 👇 مواقيت الصلاة والقبلة
  flutter_qiblah: ^3.1.0
  hijri: ^3.0.0
  dio: ^5.9.0
  path_provider: ^2.1.5
  just_audio: ^0.10.5
  
  # 👇 Dependencies for Transferred Features (Quran, etc.)
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  device_info_plus: ^11.3.0
  wakelock_plus: ^1.4.0
  scrollable_positioned_list: ^0.3.8
  get_it: ^7.6.0
  flutter_screenutil: ^5.9.0
  just_audio_background: ^0.0.1-beta.17
  toastification: ^3.0.3
  lottie: ^3.1.0
  zoom_tap_animation: ^1.1.0
  vibration: ^3.1.0
  
  quran:
    path: ./packages/quran-1.2.2
  flutter_timezone: ^5.0.1
  uuid: ^4.4.0
  home_widget: ^0.9.0
  gal: ^2.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

# 👇 حل مشاكل التعارض (مهم جداً)
dependency_overrides:
  uuid: ^4.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/json/
    - assets/svgs/
    - assets/sections/
    - assets/fonts/QPC V1 Font.ttf/
    - assets/audio/
    - assets/fonts/Cairo-Regular.ttf
    - assets/fonts/Cairo-Bold.ttf
    - assets/fonts/AmiriQuran-Regular.ttf
    - assets/fonts/NotoNastaliqUrdu-Regular.ttf
    - assets/fonts/NotoNastaliqUrdu-Bold.ttf
    - assets/fonts/UthmanTN1-Ver10.otf
    - assets/fonts/Harmattan-Regular.ttf
    - assets/fonts/Harmattan-Medium.ttf
    - assets/fonts/Harmattan-Bold.ttf
    - assets/fonts/ExpoArabic-Book.ttf
    - assets/fonts/ExpoArabic-Bold.ttf
    - assets/fonts/BFantezy-Regular.ttf
    - assets/databases/


  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: uthmanic
      fonts:
        - asset: assets/fonts/UthmanTN1-Ver10.otf
    - family: Harmattan
      fonts:
        - asset: assets/fonts/Harmattan-Regular.ttf
          weight: 400
        - asset: assets/fonts/Harmattan-Medium.ttf
          weight: 500
        - asset: assets/fonts/Harmattan-Bold.ttf
          weight: 700
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf

    - family: ExpoArabic
      fonts:
        - asset: assets/fonts/ExpoArabic-Book.ttf
        - asset: assets/fonts/ExpoArabic-Bold.ttf
          weight: 700
    - family: BFantezy
      fonts:
        - asset: assets/fonts/BFantezy-Regular.ttf
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
        - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21